 {% extends "_base.html" %}

 {% block content %}
        <h2>{{ article.title }}</h2>
        <p><strong>Autor:</strong> {{ article.author }}</p>
        <small><strong>Fecha de publicación:</strong> {{ article.created_at }}</small>
        <p><strong>Contenido:</strong> {{ article.content }}</p>
    
        <a href="{% url 'article-update' article.pk %}">Editar</a>

    {% endblock content %}
